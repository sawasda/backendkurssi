<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
    lang="en">
<link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />

<head>
    <meta charset="UTF-8">
    <title>Books</title>
</head>

<body>
    <h1>Hello <span sec:authentication="name"></span>!</h1>
    <table class="table table-striped">
        <tr>
            <th>Author</th>
            <th>Title</th>
            <th>ISBN</th>
            <th>Year</th>
            <th>Category</th>
        </tr>

        <tr th:each="book : ${books}">
            <td th:text="${book.author}">author</td>
            <td th:text="${book.title}">title</td>
            <td th:text="${book.isbn}">isbn</td>
            <td th:text="${book.publicationYear}">publicationyear</td>
            <td th:text="${book.category.name}">category</td>
            <td sec:authorize="hasAuthority('ADMIN')">
                <a th:href="@{/delete/{id}(id=${book.bookId})}" class="btn btn-danger">Delete</a>
            </td>
            <td>
                <a th:href="@{/edit/{id}(id=${book.bookId})}">Edit</a>
            </td>
        </tr>
    </table>
    <a href="/add" class="btn btn-success">Add a new book</a>
    <form th:action="@{/logout}" method="post" style="display:inline;">
        <button type="submit" class="btn btn-light">Sign out</button>
    </form>
</body>

</html>
